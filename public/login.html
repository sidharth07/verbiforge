        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 10%;
            left: 10%;
            width: 60px;
            height: 60px;
            background: var(--primary-gradient);
            border-radius: 50%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 20%;
            right: 15%;
            width: 40px;
            height: 40px;
            background: var(--secondary-color);
            border-radius: 8px;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            bottom: 30%;
            left: 5%;
            width: 50px;
            height: 50px;
            background: var(--primary-color);
            border-radius: 12px;
            animation-delay: 4s;
        }

        .floating-element:nth-child(4) {
            bottom: 15%;
            right: 10%;
            width: 35px;
            height: 35px;
            background: var(--secondary-color);
            border-radius: 50%;
            animation-delay: 1s;
        }

        .floating-element:nth-child(5) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 20px;
            opacity: 0.05;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);

            33% {
                transform: translateY(-10px) rotate(5deg);
            }
            66% {
                transform: translateY(5px) rotate(-3deg);

        /* Remember Me Checkbox Styles */
        .remember-me {
            margin-bottom: 24px;

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #4a5568;
            user-select: none;
            position: relative;
        }

        .checkbox-label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
            z-index: -1;
        }

        .checkmark {
            height: 18px;
            width: 18px;
            background-color: white;
            border: 2px solid #e2e8f0;
            border-radius: 4px;
            margin-right: 12px;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: inline-block;
        }

        .checkbox-label:hover .checkmark {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .checkbox-label input:checked ~ .checkmark {
            background-color: #667eea;
            border-color: #667eea;
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-label input:checked ~ .checkmark:after {
            display: block;
        }

        /* Mobile Design - Completely Different Layout */

    <script>
        // Check if Google OAuth is configured
        async function checkGoogleOAuth() {
            try {
                const response = await fetch('/auth/google/status');
                const data = await response.json();
                
                if (data.configured) {
                    // Show Google OAuth button when properly configured
                    const googleBtn = document.getElementById('googleBtn');
                    const divider = document.querySelector('.divider');
                    if (googleBtn) googleBtn.style.display = 'flex';
                    if (divider) divider.style.display = 'block';
                }
            } catch (error) {
                console.log('Google OAuth not configured or disabled');
                // Keep Google OAuth button hidden when OAuth is disabled
            }
        }

        // Handle Google SSO
        function signInWithGoogle() {
            const googleBtn = document.getElementById('googleBtn');
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgiIGhlaWdodD0iMTgiIHZpZXdCb3g9IjAgMCAxOCAxOCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE3LjY0IDkuMjA0NTVDMTcuNjQgOC41NjY0IDE3LjU4MjcgNy45NTI3MyAxNy40NzY0IDcuMzYzNjRIMTlWMTBIMTcuNjRWOS4yMDQ1NVoiIGZpbGw9IiNGQjQwMzEiLz4KPHBhdGggZD0iTTkgMTguMDAwMUMxMS40MyAxOC4wMDAxIDEzLjQ2NzMgMTcuMTk0NSAxNC45NjM2IDE1Ljc4MzZMMTIuNTkyNyAxMy45NzQ1QzExLjg0NzMgMTQuNTY4MiAxMC45NzI3IDE0LjkxODIgOSAxNC45MTgyQzYuNjU0NTUgMTQuOTE4MiA0LjY3MTgyIDEzLjM5NTUgNC4wNzI3MyAxMS4zOTU1SDEuMDYzNjRWMTRuLjA5MDkxQzIuNDI3MjcgMTYuMzYzNiA1LjQ0NTQ1IDE4LjAwMDEgOSAxOC4wMDAxWiIgZmlsbD0iIzM0QTA1MyIvPgo8cGF0aCBkPSJNNC4wNzI3MyAxMS4zOTU1QzQuMDcyNzMgMTAuOTk1NSA0LjA3MjczIDEwLjYxODIgNC4xNDU0NSAxMC4yNTQ1NUgxLjA2MzY0VjEzLjA5MDlIMy4wNzI3M0MzLjA3MjczIDEyLjg5MDkgMy4wNzI3MyAxMi42NzI3IDMuMDcyNzMgMTIuNDM2NEw0LjA3MjczIDExLjM5NTVaIiBmaWxsPSIjRkZDMTA3Ii8+CjxwYXRoIGQ9Ik05IDQuMDgxODJDMTAuMTYzNiA0LjA4MTgyIDExLjE4MTggNC40NzI3MyAxMS45NTQ1IDUuMTQ1NDVMMTMuOTU0NSA0LjE0NTQ1QzEyLjg2MzYgMy4wOTU0NSAxMS4wNzI3IDIuNDU0NTUgOSAyLjQ1NDU1QzUuNDQ1NDUgMi40NTQ1NSAyLjQyNzI3IDQuMDkwOTEgMS4wNjM2NCA2LjM2MzY0SDMuMDcyNzNDMy42NzE4MiA0LjM2MzY0IDUuNjU0NTUgMi44MTgxOCA5IDIuODE4MThDMTEuMDcyNyAyLjgxODE4IDEyLjg0NzMgMy40NTQ1NSAxNC4wNzI3IDQuNjM2MzZMMTYuMDcyNyAyLjYzNjM2QzE0LjQ2MzYgMS4wOTA5MSAxMS45NTQ1IDAgOSAwQzQuMDQ1NDUgMCAwIDQuMDQ1NDUgMCA5QzAgMTMuOTU0NSA0LjA0NTQ1IDE4IDkgMThDMTMuOTU0NSAxOCAxOCAxMy45NTQ1IDE4IDlDMTggOC4wOTA5MSAxNy44MTgyIDcuMjcyNzMgMTcuNDcyNyA2LjU0NTQ1TDE3LjY0IDkuMjA0NTVDMTcuNjQgOC41NjY0IDE3LjU4MjcgNy45NTI3MyAxNy40NzY0IDcuMzYzNjRIMTlWMTBIMTcuNjRWOS4yMDQ1NVoiIGZpbGw9IiNFQjQyMzIiLz4KPC9zdmc+" alt="Google"> Signing in with Google...';
            
            // Redirect to Google OAuth
            window.location.href = '/auth/google';
        }

        // Check for OAuth callback parameters
        function checkOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const user = urlParams.get('user');
            const error = urlParams.get('error');
            
            if (error) {
                showError('Google authentication failed. Please try again.');
                return;
            }
            
            if (token && user) {
                try {
                    const userData = JSON.parse(decodeURIComponent(user));
                    Auth.setAuth(token, userData);
                    
                    // Redirect based on user role
                    if (userData.isAdmin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    showError('Error processing authentication. Please try again.');
                }
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkGoogleOAuth();
            checkOAuthCallback();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            showLoading(true);
            hideError();

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rememberMe })
                });

                const data = await response.json();

                if (response.ok) {
                    // Persist auth
                    Auth.setAuth(data.token, data.user);
                    // Redirect admin users to admin panel, regular users to dashboard
                    if (data.isAdmin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }

            showLoading(false);
        });

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('loginBtn').disabled = show;
        }
    </script>
